
#
# Dotfiles

os_window_title Dot
# os_window_class mywindow
os_window_name dotfiles
os_window_state normal

# Dot

new_tab 📍 dot
layout splits

cd ~/.homesick/repos/dot

launch /run/current-system/sw/bin/zsh -c "/run/current-system/sw/bin/nvim -S $HOME/.config/nvim/sessions/dot--dot.vim"
launch --location=vsplit /run/current-system/sw/bin/zsh -c "claude"
launch --location=hsplit /run/current-system/sw/bin/zsh

