# vim:fileencoding=utf-8:ft=conf

# Bootstrap: pre-start gpg-agent, then load both sessions

launch /run/current-system/sw/bin/zsh --login -c "gpgconf --launch gpg-agent 2>/dev/null; sleep 0.5 && kitty @ action goto_session $HOME/.config/kitty/sessions/dotfiles.kitty-session && sleep 0.3 && kitty @ action goto_session $HOME/.config/kitty/sessions/work.kitty-session && sleep 0.3 && kitty @ action goto_session $HOME/.config/kitty/sessions/dotfiles.kitty-session && kitty @ close-window --self"
